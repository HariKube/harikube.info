    port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    app: harikube-operator
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harikube-operator-deploy
  namespace: harikube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harikube-operator
  template:
    metadata:
      labels:
        app: harikube-operator
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - arm64
                - amd64
                - s390x
                - ppc64le
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --webhook-cert-path=/etc/harikube-operator-crt
        command:
        - /manager
        image: registry.harikube.info/harikube/operator:release-v1.0.2
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /tmp
          name: tmp
        - mountPath: /etc/harikube-operator-crt
          name: harikube-operator-crt
          readOnly: true
      imagePullSecrets:
      - name: harikube-registry-secret
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: harikube-operator-sa
      terminationGracePeriodSeconds: 10
      volumes:
      - emptyDir: {}
        name: tmp
      - name: harikube-operator-crt
        secret:
          secretName: harikube-operator-crt
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harikube-operator-crt
  namespace: harikube
spec:
  dnsNames:
  - harikube-operator-svc.harikube.svc
  - harikube-operator-svc.harikube.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: harikube-operator-issuer
  secretName: harikube-operator-crt
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harikube-operator-metrics-crt
  namespace: harikube
spec:
  dnsNames:
  - harikube-operator-metrics-svc.harikube.svc
  - harikube-operator-metrics-svc.harikube.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: harikube-operator-issuer
  secretName: harikube-operator-metrics-crt
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: harikube-operator-issuer
  namespace: harikube
spec:
  selfSigned: {}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: harikube-operator-sm
  namespace: harikube
spec:
  endpoints:
  - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    path: /metrics
    port: metrics
    scheme: https
    tlsConfig:
      ca:
        secret:
          key: ca.crt
          name: metrics-server-cert
      cert:
        secret:
          key: tls.crt
          name: metrics-server-cert
      insecureSkipVerify: false
      keySecret:
        key: tls.key
        name: metrics-server-cert
      serverName: SERVICE_NAME.SERVICE_NAMESPACE.svc
  selector:
    matchLabels:
      app: harikube-operator
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: harikube-operator-metrics-netpol
  namespace: harikube
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          metrics: enabled
    ports:
    - port: 8443
      protocol: TCP
  podSelector:
    matchLabels:
      app: harikube-operator
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: harikube-operator-netpol
  namespace: harikube
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          webhook: enabled
    ports:
    - port: 9443
      protocol: TCP
  podSelector:
    matchLabels:
      app: harikube-operator
  policyTypes:
  - Ingress
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: harikube/harikube-operator-crt
  name: harikube-operator-validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: harikube-operator-svc
      namespace: harikube
      path: /validate-harikube-info-v1-topologyconfig
  failurePolicy: Fail
  name: vtopologyconfig-v1.kb.io
  rules:
  - apiGroups:
    - harikube.info
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - topologyconfigs
  sideEffects: None
