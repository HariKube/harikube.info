# Source: harikube-helm-charts/templates/middleware-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: harikube
    helm.sh/chart: harikube-helm-charts-1.0.4
    app.kubernetes.io/version: "1.0.4"
    app.kubernetes.io/managed-by: Helm
  name: harikube-middleware-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harikube-middleware
  template:
    metadata:
      labels:
        app: harikube
        helm.sh/chart: harikube-helm-charts-1.0.4
        app.kubernetes.io/version: "1.0.4"
        app.kubernetes.io/managed-by: Helm
        app: harikube-middleware
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - arm64
                - amd64
                - s390x
                - ppc64le
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: harikube-registry-secret
      containers:
      - name: middleware
        image: "registry.harikube.info/harikube/middleware:release-v1.0.4"
        imagePullPolicy: IfNotPresent
        env:
        - name: TOPOLOGY_CONFIG
          value: secret://harikube/topology-config
        - name: LICENSE_KEY_FILE
          value: /etc/harikube/license
        - name: ENABLE_TELEMETRY_PUSH
          value: "false"
        args:
        - --log-format=json
        - --listen-address=0.0.0.0:2379
        - --metrics-bind-address=:8080
        - --server-ca-file=/etc/harikube-middleware-crt/ca.crt
        - --server-cert-file=/etc/harikube-middleware-crt/tls.crt
        - --server-key-file=/etc/harikube-middleware-crt/tls.key
        - --slow-sql-threshold=2s
        - --datastore-max-idle-connections=50
        - --datastore-max-open-connections=90
        - --datastore-connection-max-lifetime=5m
        - --datastore-connection-max-idle-lifetime=5m
        - --endpoint=multi://sqlite:///db/main.db?_journal=WAL&cache=shared
        ports:
        - containerPort: 2379
          name: api-port
        - containerPort: 8080
          name: metrics
        volumeMounts:
        - mountPath: /etc/harikube
          name: license
          readOnly: true
        - mountPath: /etc/harikube-middleware-crt
          name: harikube-middleware-crt
          readOnly: true
        - mountPath: /db
          name: harikube-middleware-pvc
        - mountPath: /tmp
          name: tmp
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 8080
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 8080
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            memory: 4Gi
          requests:
            cpu: 1000m
            memory: 1Gi
      volumes:
      - name: license
        secret:
          secretName: harikube-license
      - name: harikube-middleware-crt
        secret:
          secretName: harikube-middleware-crt
      - name: harikube-middleware-pvc
        persistentVolumeClaim:
          claimName: harikube-middleware-pvc
      - emptyDir: {}
        name: tmp
