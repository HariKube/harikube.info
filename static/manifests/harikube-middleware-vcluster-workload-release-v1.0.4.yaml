apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: harikube
    helm.sh/chart: harikube-helm-charts-1.0.4
    app.kubernetes.io/version: "1.0.4"
    app.kubernetes.io/managed-by: Helm
  name: harikube-operator-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harikube-operator
  template:
    metadata:
      labels:
        app: harikube
        helm.sh/chart: harikube-helm-charts-1.0.4
        app.kubernetes.io/version: "1.0.4"
        app.kubernetes.io/managed-by: Helm
        app: harikube-operator
    spec:
      terminationGracePeriodSeconds: 10
      serviceAccountName: harikube-operator-sa
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - arm64
                - amd64
                - s390x
                - ppc64le
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: harikube-registry-secret
      containers:
      - name: manager
        image: "registry.harikube.info/harikube/operator:release-v1.0.2"
        imagePullPolicy: IfNotPresent
        args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --metrics-secure
        - --webhook-cert-path=/etc/harikube-operator-crt
        command:
        - /manager
        ports:
        - containerPort: 9443
          name: webhook
        volumeMounts:
        - mountPath: /tmp
          name: tmp
        - mountPath: /etc/harikube-operator-crt
          name: harikube-operator-crt
          readOnly: true
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      volumes:
      - emptyDir: {}
        name: tmp
      - name: harikube-operator-crt
        secret:
          secretName: harikube-operator-crt
